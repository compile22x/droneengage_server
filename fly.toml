app = "de-server"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# WebSocket server for drones and GCS
# internal_port must match server_port in server.config (443)
# handlers = ["tls"] only — "http" handler breaks WebSocket upgrades
[[services]]
  protocol = "tcp"
  internal_port = 443
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 443
    handlers = ["tls"]

[vm]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
