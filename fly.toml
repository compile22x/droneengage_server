app = "de-server"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# WebSocket server for drones and GCS
# handlers = ["tls", "http"] required for C++ WSS client proper TLS+HTTP upgrade
[[services]]
  protocol = "tcp"
  internal_port = 443
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

# UDP proxy for Mission Planner (UDPCI connection)
[[services]]
  protocol = "udp"
  internal_port = 15412
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 15412

[vm]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
